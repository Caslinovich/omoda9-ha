; Configurazione della suite di sviluppo (P2-8). Come `tests/`, questo file è tooling
; interno: NON fa parte del package pubblicabile su HACS (vedi .git/info/exclude).
;
; `asyncio_mode = auto` è richiesto da pytest-homeassistant-custom-component: il plugin
; installa fixture async autouse (event loop, verifica del cleanup) che in modalità
; strict farebbero fallire i test sincroni sui moduli core/.
[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
; HA logga a INFO la registrazione di ogni entità: con 105 entità il log di un
; fallimento diventa illeggibile. Si alza la soglia; per indagare: `-o log_level=INFO`.
log_level = WARNING
log_cli_level = WARNING
